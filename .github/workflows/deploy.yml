name: 'Deploy'

on:
  pull_request:
    branches: [ "main", "develop" ]
    types: [closed]

jobs:
  terraform:
    name: 'Deploy Infra & App'
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      APPLICATION_NAME: memegen
      DOCKER_API_VERSION: 1.25
      GH_TOKEN: ${{ github.token }}

    defaults:
      run:
        shell: bash
        working-directory: ./infra

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Echo Versions
      run: | 
        docker --version
        python --version
        aws --version

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

    - name: Extract branch name
      shell: bash
      run: echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
      id: extract_branch

    - name: Install Docker Slim
      run: |
        sudo apt update
        sudo apt install curl
        curl --version
        curl -sL https://raw.githubusercontent.com/slimtoolkit/slim/master/scripts/install-slim.sh | sudo -E bash -
        slim --version

    - name: Terraform Init
      run: terraform init -backend-config="key=$APPLICATION_NAME-${{ steps.extract_branch.outputs.branch }}.tfstate"

    - name: Terraform Plan
      run: terraform plan -var 'environment=${{ steps.extract_branch.outputs.branch }}' -input=false

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false -var 'environment=${{ steps.extract_branch.outputs.branch }}'

    - name: Create Pull Request to Develop
      if: steps.extract_branch.outputs.branch == 'develop'
      run: |
        gh pr create --base main --title "Automated PR to Develop" --body "This PR was created automatically by GitHub Actions."